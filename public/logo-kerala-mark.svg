  <path d="M48 62 C50 68 52 72 54 76" stroke="#C9A86C" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

  <!-- Coconuts -->
  <circle cx="44.5" cy="55.5" r="2.4" fill="#C9A86C"/>
  <circle cx="51.5" cy="55" r="2.1" fill="#E8D5A8"/>
  <circle cx="48" cy="58.5" r="1.8" fill="#C9A86C"/>

