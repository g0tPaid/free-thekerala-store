    <path d="M48 54 C36 44 26 40 16 42" stroke="#FAF8F3" stroke-width="1.6"/>
    <path d="M48 54 C60 44 70 40 80 42" stroke="#FAF8F3" stroke-width="1.6"/>
    <path d="M48 54 C38 36 34 24 36 14" stroke="#FAF8F3" stroke-width="1.7"/>
    <path d="M48 54 C58 36 62 24 60 14" stroke="#FAF8F3" stroke-width="1.7"/>

